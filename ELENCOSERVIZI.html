<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenco Servizi - AUSER Asti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="elencoservizi.css">
    <link rel="stylesheet" href="nuovoservizio.css">
    <link rel="stylesheet" href="modifica-servizio.css">
    <link rel="stylesheet" href="completa-servizio.css">
</head>
<body>
    <div class="container-fluid servizi-container">
        <div class="page-header-wrapper">
            <div class="header-left">
                <button class="btn btn-chiudi" id="btn-chiudi">CHIUDI</button>
                <button class="btn btn-tutti-header" id="btn-tutti">TUTTI</button>
            </div>
            <div class="header-center">
                <div class="header-title-block">
                    <div class="anno-filtro-buttons">
                        <button type="button" class="btn-anno-filtro active" id="btn-anno-corrente">Anno corrente</button>
                        <button type="button" class="btn-anno-filtro" id="btn-anno-precedente">Anno precedente</button>
                        <button type="button" class="btn-anno-filtro" id="btn-tutti-anni">Tutti gli Anni</button>
                    </div>
                    <h1 class="page-title">
                        <span id="servizi-title-text">ELENCO SERVIZI ANNO CORRENTE</span>
                        <span id="servizi-count" class="servizi-count-inline">(0)</span>
                    </h1>
                    <span class="filter-warning" id="filter-warning" style="display: none;">(Attenzione visualizzazione filtrata)</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-ricerca-header" id="btn-ricerca">RICERCA</button>
            </div>
        </div>
        
        <!-- Modale Ricerca -->
        <div id="modal-ricerca" class="modal-ricerca-overlay" style="display: none;">
            <div class="modal-ricerca-content">
                <div class="modal-ricerca-header">
                    <h2>RICERCA AVANZATA</h2>
                    <button class="modal-close-btn" id="btn-close-modal">&times;</button>
                </div>
                <div class="modal-ricerca-body">
                    <div class="ricerca-form-grid">
                        <div class="ricerca-form-group">
                            <label for="ricerca-idservizio">IDSERVIZIO</label>
                            <input type="text" id="ricerca-idservizio" class="ricerca-input">
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-idsocio">IDSOCIO</label>
                            <input type="text" id="ricerca-idsocio" class="ricerca-input">
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-data-da">DATA DA</label>
                            <input type="date" id="ricerca-data-da" class="ricerca-input">
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-data-a">DATA A</label>
                            <input type="date" id="ricerca-data-a" class="ricerca-input">
                        </div>
                        <div class="ricerca-form-group ricerca-form-group-full">
                            <label for="ricerca-nominativo">NOMINATIVO</label>
                            <div class="autocomplete-wrapper">
                                <input type="text" id="ricerca-nominativo" class="ricerca-input autocomplete-input" autocomplete="off">
                                <div id="ricerca-nominativo-suggestions" class="autocomplete-suggestions"></div>
                            </div>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-stato-incasso">STATO INCASSO</label>
                            <select id="ricerca-stato-incasso" class="ricerca-select">
                                <option value="">Tutti</option>
                                <option value="INCASSATO">INCASSATO</option>
                                <option value="DA INCASSARE">DA INCASSARE</option>
                                <option value="GRATIS">GRATIS</option>
                                <option value="ANNULLATO">ANNULLATO</option>
                            </select>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-tipo-pagamento">TIPO DI PAGAMENTO</label>
                            <select id="ricerca-tipo-pagamento" class="ricerca-select">
                                <option value="">Tutti</option>
                            </select>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-tipo-servizio">TIPO DI SERVIZIO</label>
                            <select id="ricerca-tipo-servizio" class="ricerca-select">
                                <option value="">Tutti</option>
                                <option value="STANDARD">Standard</option>
                                <option value="SOLLEVATORE">Sollevatore</option>
                            </select>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-carrozzina">CARROZZINA</label>
                            <select id="ricerca-carrozzina" class="ricerca-select">
                                <option value="">Tutti</option>
                                <option value="AUSER">AUSER</option>
                                <option value="SOCIO">SOCIO</option>
                            </select>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-richiedente">RICHIEDENTE</label>
                            <select id="ricerca-richiedente" class="ricerca-select">
                                <option value="">Tutti</option>
                                <option value="SOCIO">SOCIO</option>
                                <option value="COMUNE">COMUNE</option>
                                <option value="ALTRI">ALTRI</option>
                            </select>
                        </div>
                        <div class="ricerca-form-group">
                            <label for="ricerca-operatore">OPERATORE</label>
                            <select id="ricerca-operatore" class="ricerca-select">
                                <option value="">Tutti</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-ricerca-footer">
                    <button class="btn btn-annulla-modal" id="btn-annulla-modal">ANNULLA</button>
                    <button class="btn btn-ricerca-modal" id="btn-ricerca-modal">RICERCA</button>
                </div>
            </div>
        </div>

        <!-- Container scrollabile con tutti i servizi -->
        <div class="servizi-container-scrollabile" id="servizi-container-body">
            <div class="servizi-lista-loading">Caricamento servizi...</div>
        </div>
    </div>
    
    <footer class="servizi-footer">
        <div class="footer-buttons-container">
            <div class="footer-buttons-left">
                <button class="btn btn-filtro-stato" id="btn-da-eseguire">DA ESEGUIRE</button>
                <button class="btn btn-filtro-stato" id="btn-eseguiti">ESEGUITI</button>
                <button class="btn btn-filtro-stato" id="btn-annullati">ANNULLATI</button>
                <button class="btn btn-filtro-stato" id="btn-completato" disabled>COMPLETATO</button>
            </div>
            <div class="servizi-pagination-bar" id="servizi-pagination-bar" aria-label="Paginazione elenco servizi"></div>
            <div class="footer-buttons-right">
                <button class="btn btn-filtro-richiedente" id="btn-altri">ALTRI</button>
                <button class="btn btn-filtro-richiedente" id="btn-comune">COMUNE</button>
                <button class="btn btn-filtro-richiedente" id="btn-socio">SOCIO</button>
            </div>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="elencoservizi.js"></script>
</body>
</html>

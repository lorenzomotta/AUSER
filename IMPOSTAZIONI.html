<!DOCTYPE html>
<html lang="it">
<head>

    <title>Impostazioni - AUSER Asti</title>
    <link rel="stylesheet" href="impostazioni.css">
</head>
<body>
    <div class="imp-app">
        <header class="imp-header">
            <h1 class="imp-title">IMPOSTAZIONI</h1>

        </header>

        <p class="imp-intro">Valori della tabella Impostazioni_supa</p>

        <div class="imp-loading" id="imp-loading">Caricamento impostazioni...</div>
        <div class="imp-errore" id="imp-errore" hidden></div>
        <div class="imp-vuoto" id="imp-vuoto" hidden>Nessuna impostazione trovata.</div>

        <div class="imp-lista" id="imp-lista" hidden></div>
    </div>

    <script type="module" src="impostazioni.js"></script>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUSER Asti - Gestione Operativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="nuovoservizio.css">
    <link rel="stylesheet" href="modifica-servizio.css">
    <link rel="stylesheet" href="completa-servizio.css">
</head>
<body>
    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        <!-- Header Section -->
        <header class="header-section">
            <div class="header-app-actions">
                <button type="button" class="btn btn-close-app-header" title="Chiudi Applicazione">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M18 20V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14"></path>
                        <path d="M2 20h20"></path>
                        <path d="M14 12v.01"></path>
                    </svg>
                </button>
                <button type="button" class="btn btn-impostazioni-header" id="btn-impostazioni" title="Impostazioni" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
                <button type="button" class="btn btn-utenti-header" id="btn-utenti" title="Gestione utenti" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
            <div class="container-fluid">
                <div class="row align-items-center justify-content-center">
                    <div class="col-12 text-center">
                        <h1 class="main-title">GESTIONE OPERATIVA</h1>
                        <div class="date-info">
                            <span id="current-date"></span>
                            <span class="date-separator"> - </span>
                            <span id="week-number"></span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="container-fluid">
                <div class="row">
                    <!-- Colonna sinistra: SERVIZI DEL GIORNO (verde) -->
                    <div class="col-md-4">
                        <h2 class="section-title">SERVIZI DEL GIORNO</h2>
                        <div class="services-column services-column-green" id="servizi-giorno">
                            <div style="padding: 20px; text-align: center; color: #666;">Caricamento servizi...</div>
                        </div>
                    </div>

                    <!-- Colonna centrale: PROSSIMI SERVIZI (arancione) -->
                    <div class="col-md-4">
                        <h2 class="section-title">PROSSIMI SERVIZI</h2>
                        <div class="services-column services-column-orange" id="prossimi-servizi">
                            <!-- Service entries will be dynamically loaded here -->
                        </div>
                    </div>

                    <!-- Colonna destra: SERVIZI INSERITI OGGI (giallo) e TESSERE DA FARE (blu) -->
                    <div class="col-md-4">
                        <h2 class="section-title">SERVIZI INSERITI OGGI</h2>
                        <div class="services-column services-column-yellow" id="servizi-inseriti-oggi">
                            <!-- Service entries will be dynamically loaded here -->
                        </div>
                        
                        <h2 class="section-title">TESSERE DA FARE</h2>
                        <div class="cards-column cards-column-blue" id="tessere-da-fare">
                            <!-- Card entries will be dynamically loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Sidebar Section (destra) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-section">
                <div class="logo-circle">a</div>
                <div class="logo-text">auser Asti</div>
            </div>
        </div>
        
        <div class="sidebar-buttons">
            <button class="btn btn-sidebar btn-sidebar-primary" id="btn-calendario-servizi">CALENDARIO SERVIZI</button>
            <button class="btn btn-sidebar btn-sidebar-secondary" id="btn-nuovo-servizio">NUOVO SERVIZIO</button>
            
            <div class="sidebar-divider"></div>
            
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-elenco-servizi">ELENCO SERVIZI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-report-giorno">REPORT DEL GIORNO</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-report-settimanale">REPORT SETTIMANALE</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-riepilogo-incassi">INCASSI GIORNALIERI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-elenco-soci">ELENCO SOCI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-elenco-operatori">ELENCO OPERATORI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-elenco-mezzi">ELENCO MEZZI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-tratte-fuori-asti">TRATTE FUORI ASTI</button>
            <button class="btn btn-sidebar btn-sidebar-nav" id="btn-riepilogo-pagamenti" hidden>RIEPILOGO PAGAMENTI</button>
            <div class="sidebar-divider"></div>
            <div class="sidebar-user" id="sidebar-user" hidden>
                <span class="sidebar-user-label" id="sidebar-user-label"></span>
                <button type="button" class="btn btn-sidebar btn-sidebar-logout" id="btn-logout">CAMBIA UTENTE</button>
            </div>
        </div>
    </aside>

    <!-- Conferma chiusura applicazione -->
    <div id="home-dialog-esci" class="ns-dialog-overlay" hidden aria-hidden="true">
        <div class="ns-dialog" role="dialog" aria-modal="true" aria-labelledby="home-dialog-esci-messaggio">
            <p id="home-dialog-esci-messaggio" class="ns-dialog-messaggio">
                Vuoi davvero uscire dall'applicazione?
            </p>
            <div class="ns-dialog-actions">
                <button type="button" id="home-dialog-esci-si" class="ns-dialog-btn ns-dialog-btn-si">SÌ</button>
                <button type="button" id="home-dialog-esci-no" class="ns-dialog-btn ns-dialog-btn-no">NO</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Log immediato per verificare se index-sidebar.html viene caricato
        console.log('=== index-sidebar.html caricato ===');
        console.log('URL:', window.location.href);
        console.log('Query string:', window.location.search);
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>

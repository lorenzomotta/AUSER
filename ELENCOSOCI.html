<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenco Soci - AUSER Asti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="elencosoci.css">
</head>
<body>
    <div class="container-fluid soci-container">
        <div class="page-header-wrapper">
            <div class="header-left">
                <span class="tessere-scadute-label">TESSERE SCADUTE N.</span>
                <span class="tessere-scadute-count" id="tessere-scadute-count">0</span>
                <button type="button" class="btn-filter-scadute" id="btn-filter-scadute" title="Mostra solo tessere scadute" disabled aria-label="Filtra tessere scadute">
                    <svg class="icon-filter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                </button>
                <button type="button" class="btn btn-ricerca-avanzata" id="btn-ricerca-avanzata" title="Cerca nei dati anagrafici">
                    RICERCA AVANZATA
                </button>
                <button type="button" class="btn btn-rimuovi-filtro" id="btn-rimuovi-filtro" hidden title="Rimuovi il filtro avanzato">
                    RIMUOVI FILTRO
                </button>
            </div>
            <div class="header-center">
                <div class="page-title-row">
                    <h1 class="page-title">ELENCO SOCI <span id="soci-count" style="font-size: 0.8em; color: #666;">(0)</span></h1>
                    <button class="btn-icon-search" id="btn-show-search" title="Cerca">
                        <span class="icon-search">🔍</span>
                    </button>
                    <div class="search-container" id="search-container" style="display: none;">
                        <input type="text" id="search-input" class="search-input" placeholder="Cerca per nominativo...">
                        <button class="btn-icon-close" id="btn-hide-search" title="Chiudi ricerca">
                            <span class="icon-close">✕</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-nuovo-socio" id="btn-nuovo-socio" type="button">NUOVO SOCIO</button>
                <button class="btn btn-chiudi" id="btn-chiudi">CHIUDI</button>
            </div>
        </div>
        
        <!-- Container scrollabile con tutti i soci -->
        <div class="soci-container-scrollabile" id="soci-container-body">
            <div class="soci-lista-loading">Caricamento soci...</div>
        </div>
    </div>
    
    <footer class="soci-footer">
        <div class="soci-footer-inner">
            <div class="soci-footer-left">
                <button type="button" class="btn btn-mostra-archiviati" id="btn-mostra-archiviati">Mostra Archiviati</button>
            </div>
            <div class="soci-pagination-bar" id="soci-pagination-bar" aria-label="Paginazione elenco soci"></div>
            <div class="soci-footer-right">
                <button type="button" class="btn btn-export-elenco" id="btn-export-elenco" title="Esporta l'elenco visualizzato in PDF o Excel">
                    ESPORTA ELENCO
                </button>
            </div>
        </div>
    </footer>

    <!-- Modale opzioni export elenco soci -->
    <div class="soci-modal-pdf-overlay" id="modal-stampa-pdf" hidden>
        <div class="soci-modal-pdf" role="dialog" aria-labelledby="modal-stampa-pdf-title" aria-modal="true">
            <div class="soci-modal-pdf-header">
                <h2 id="modal-stampa-pdf-title">Esporta elenco soci</h2>
                <button type="button" class="soci-modal-pdf-close" id="btn-stampa-pdf-chiudi" title="Chiudi" aria-label="Chiudi">✕</button>
            </div>
            <p class="soci-modal-pdf-intro">
                Verranno esportati <strong id="pdf-soci-count">0</strong> soci (filtri attuali a schermo).
            </p>
            <div class="soci-modal-pdf-options">
                <label class="soci-modal-pdf-option">
                    <input type="checkbox" id="pdf-include-anagrafica">
                    <span>Includi dati anagrafici (codice fiscale, nascita, residenza, telefono…)</span>
                </label>
                <div class="soci-modal-pdf-subflags" id="export-anagrafica-subflags">
                    <label class="soci-modal-pdf-subflag">
                        <input type="checkbox" id="export-flag-operatore" checked>
                        <span>Operatore</span>
                    </label>
                    <label class="soci-modal-pdf-subflag">
                        <input type="checkbox" id="export-flag-disponibilita" checked>
                        <span>Disponibilità</span>
                    </label>
                    <label class="soci-modal-pdf-subflag">
                        <input type="checkbox" id="export-flag-nota" checked>
                        <span>Note</span>
                    </label>
                    <label class="soci-modal-pdf-subflag">
                        <input type="checkbox" id="export-flag-attivo" checked>
                        <span>Attivo</span>
                    </label>
                    <label class="soci-modal-pdf-subflag">
                        <input type="checkbox" id="export-flag-archiviato" checked>
                        <span>Archiviato</span>
                    </label>
                </div>
                <label class="soci-modal-pdf-option">
                    <input type="checkbox" id="pdf-include-tesseramento">
                    <span>Includi dati tesseramento (numero tessera e scadenza)</span>
                </label>
            </div>
            <p id="pdf-stampa-errore" class="soci-modal-pdf-errore" role="alert" hidden></p>
            <div class="soci-modal-pdf-actions">
                <button type="button" class="btn btn-stampa-pdf-annulla" id="btn-stampa-pdf-annulla">ANNULLA</button>
                <button type="button" class="btn btn-export-excel-genera" id="btn-export-excel-genera">ESPORTA EXCEL</button>
                <button type="button" class="btn btn-stampa-pdf-genera" id="btn-stampa-pdf-genera">GENERA PDF</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="elencosoci.js"></script>
</body>
</html>

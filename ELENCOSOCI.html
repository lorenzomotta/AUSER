<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenco Soci - AUSER Asti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="elencosoci.css">
</head>
<body>
    <div class="container-fluid soci-container">
        <div class="page-header-wrapper">
            <div class="header-left">
                <span class="tessere-scadute-label">TESSERE SCADUTE N.</span>
                <span class="tessere-scadute-count" id="tessere-scadute-count">0</span>
                <button type="button" class="btn-filter-scadute" id="btn-filter-scadute" title="Mostra solo tessere scadute" disabled aria-label="Filtra tessere scadute">
                    <svg class="icon-filter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                </button>
                <button type="button" class="btn btn-ricerca-avanzata" id="btn-ricerca-avanzata" title="Cerca nei dati anagrafici">
                    RICERCA AVANZATA
                </button>
                <button type="button" class="btn btn-rimuovi-filtro" id="btn-rimuovi-filtro" hidden title="Rimuovi il filtro avanzato">
                    RIMUOVI FILTRO
                </button>
            </div>
            <div class="header-center">
                <div class="page-title-row">
                    <h1 class="page-title">ELENCO SOCI <span id="soci-count" style="font-size: 0.8em; color: #666;">(0)</span></h1>
                    <button class="btn-icon-search" id="btn-show-search" title="Cerca">
                        <span class="icon-search">🔍</span>
                    </button>
                    <div class="search-container" id="search-container" style="display: none;">
                        <input type="text" id="search-input" class="search-input" placeholder="Cerca per nominativo...">
                        <button class="btn-icon-close" id="btn-hide-search" title="Chiudi ricerca">
                            <span class="icon-close">✕</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-nuovo-socio" id="btn-nuovo-socio" type="button">NUOVO SOCIO</button>
                <button class="btn btn-chiudi" id="btn-chiudi">CHIUDI</button>
            </div>
        </div>
        
        <!-- Container scrollabile con tutti i soci -->
        <div class="soci-container-scrollabile" id="soci-container-body">
            <div class="soci-lista-loading">Caricamento soci...</div>
        </div>
    </div>
    
    <footer class="soci-footer">
        <div class="soci-footer-inner">
            <div class="soci-footer-left">
                <button type="button" class="btn btn-mostra-archiviati" id="btn-mostra-archiviati">Mostra Archiviati</button>
            </div>
            <div class="soci-pagination-bar" id="soci-pagination-bar" aria-label="Paginazione elenco soci"></div>
            <div class="soci-footer-right" aria-hidden="true"></div>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="elencosoci.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Servizi — Accesso Operatori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/list@6.1.15/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="calendario.css?v=8">
    <link rel="stylesheet" href="calendario-web.css?v=18">
</head>
<body>
    <!-- Schermata login operatori -->
    <div id="web-login-screen" class="web-login-screen">
        <div class="web-login-card">
            <div class="web-login-logo">auser Asti</div>
            <h1 class="web-login-title">Calendario servizi</h1>
            <p class="web-login-subtitle">Accesso riservato agli operatori</p>

            <form id="web-login-form" class="web-login-form" autocomplete="on">
                <div class="web-login-field">
                    <label for="web-login-email">Email</label>
                    <input type="email" id="web-login-email" class="web-login-input" required
                        autocomplete="username" placeholder="nome@esempio.it">
                </div>
                <div class="web-login-field">
                    <label for="web-login-password">Password</label>
                    <input type="password" id="web-login-password" class="web-login-input" required
                        autocomplete="current-password" placeholder="Password">
                </div>
                <p id="web-login-errore" class="web-login-errore" role="alert" hidden></p>
                <button type="submit" id="web-login-submit" class="web-login-btn">ACCEDI</button>
            </form>

            <p class="web-login-hint">
                Se non riesci ad accedere, contatta l'amministratore per l'attivazione dell'account operatore.
            </p>
        </div>
    </div>

    <!-- Calendario (visibile dopo login) -->
    <div id="web-calendario-app" class="web-calendario-app" hidden>
        <div class="calendario-container">
            <header class="calendario-header">
                <div class="header-center">
                    <h1 class="page-title">CALENDARIO SERVIZI</h1>
                    <span class="servizi-count" id="calendario-count">(0 servizi)</span>
                    <span class="web-user-label" id="web-user-label"></span>
                </div>
                <div class="header-toolbar">
                    <div class="header-left">
                        <button type="button" class="btn btn-chiudi" id="btn-logout">ESCI</button>
                    </div>
                    <div class="header-right">
                        <div class="vista-buttons" role="group" aria-label="Vista calendario">
                            <button type="button" class="btn-vista active" data-vista="dayGridMonth">MESE</button>
                            <button type="button" class="btn-vista" data-vista="dayGridWeek">SETTIMANA</button>
                            <button type="button" class="btn-vista" data-vista="dayGridDay">GIORNO</button>
                        </div>
                    </div>
                </div>
            </header>

            <div id="calendario-loading" class="calendario-loading">Caricamento servizi...</div>
            <div id="calendario-mount"></div>
        </div>
    </div>

    <div id="modal-servizio" class="modal-servizio-overlay" style="display: none;" aria-hidden="true">
        <div class="modal-servizio-content" role="dialog" aria-labelledby="modal-servizio-title">
            <div class="modal-servizio-header">
                <h2 id="modal-servizio-title">DETTAGLIO SERVIZIO</h2>
                <button type="button" class="modal-close-btn" id="btn-close-modal" aria-label="Chiudi">&times;</button>
            </div>
            <div class="modal-servizio-body" id="modal-servizio-body"></div>
            <div class="modal-servizio-footer modal-servizio-footer-actions">
                <button type="button" class="btn-salva-modifiche-modal" id="btn-salva-modifiche-servizio" hidden>SALVA MODIFICHE</button>
                <button type="button" class="btn-compila-modal" id="btn-compila-fine-servizio">COMPILA DATI</button>
                <button type="button" class="btn-chiudi-modal" id="btn-chiudi-modal">CHIUDI</button>
            </div>
        </div>
    </div>

    <!-- Modale compilazione dati fine servizio (sopra al dettaglio) -->
    <div id="modal-compila-servizio" class="modal-compila-overlay" style="display: none;" aria-hidden="true">
        <div class="modal-compila-content" role="dialog" aria-labelledby="modal-compila-title">
            <div class="modal-compila-header">
                <h2 id="modal-compila-title">DATI FINE SERVIZIO</h2>
                <button type="button" class="modal-close-btn" id="btn-close-compila" aria-label="Chiudi">&times;</button>
            </div>
            <div class="modal-compila-body">
                <p id="modal-compila-info" class="modal-compila-info"></p>
                <div class="modal-compila-km-row">
                    <div class="modal-compila-field">
                        <label for="compila-km-uscita">KM USCITA</label>
                        <input type="text" id="compila-km-uscita" class="modal-compila-input" inputmode="decimal"
                            placeholder="Es. 12500" autocomplete="off">
                    </div>
                    <div class="modal-compila-field">
                        <label for="compila-km-rientro">KM RIENTRO</label>
                        <input type="text" id="compila-km-rientro" class="modal-compila-input" inputmode="decimal"
                            placeholder="Es. 12545" autocomplete="off">
                    </div>
                </div>
                <div class="modal-compila-field">
                    <label for="compila-km">KM</label>
                    <input type="text" id="compila-km" class="modal-compila-input" inputmode="decimal"
                        placeholder="Es. 45 (o calcolato da uscita/rientro)" autocomplete="off">
                </div>
                <div class="modal-compila-field">
                    <label for="compila-tempo">TEMPO (ore:minuti)</label>
                    <input type="text" id="compila-tempo" class="modal-compila-input"
                        placeholder="Es. 01:30" autocomplete="off">
                </div>
                <div class="modal-compila-field">
                    <label for="compila-note">NOTE FINE SERVIZIO</label>
                    <textarea id="compila-note" class="modal-compila-textarea" rows="4"
                        placeholder="Note aggiuntive a fine servizio"></textarea>
                </div>
                <p id="modal-compila-errore" class="modal-compila-errore" role="alert" hidden></p>
            </div>
            <div class="modal-compila-footer">
                <button type="button" class="btn-annulla-compila" id="btn-annulla-compila">ANNULLA</button>
                <button type="button" class="btn-salva-compila" id="btn-salva-compila">SALVA</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.15/locales/it.global.min.js"></script>
    <script type="module" src="calendario-web.js?v=19"></script>
</body>
</html>

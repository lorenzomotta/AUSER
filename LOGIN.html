<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso - AUSER Asti</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-circle">a</span>
                <span class="login-logo-text">auser Asti</span>
            </div>
            <h1 class="login-title">GESTIONE OPERATIVA</h1>
            <p class="login-subtitle">Accedi con il tuo account</p>

            <form id="login-form" class="login-form" autocomplete="on">
                <div class="login-field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required autocomplete="username"
                        placeholder="nome@esempio.it">
                </div>
                <div class="login-field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password"
                        placeholder="Password">
                </div>
                <p id="login-errore" class="login-errore" role="alert" hidden></p>
                <button type="submit" id="login-submit" class="login-btn">ACCEDI</button>
            </form>

            <p class="login-hint">
                Solo utenti presenti in Supabase con permesso Programma.
                Riepilogo Pagamenti e Impostazioni sono riservati agli amministratori.
            </p>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
